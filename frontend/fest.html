    <style>
#progress-container {
  width: 100%;
  background-color: #ddd;
  height: 30px;
  border-radius: 5px;
  overflow: hidden;
}

#progress-bar {
  height: 100%;
  width: 0%;
  background-color: #4CAF50;
  animation: fillBar 30s linear forwards;
}

@keyframes fillBar {
  from { width: 0%; }
  to { width: 100%; }
}
</style>
</head>
